<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Asset Management{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .breadcrumb {
            background: rgba(255,255,255,0.15); padding: 12px 20px; border-radius: 10px;
            margin-bottom: 20px; font-size: 14px; color: #fff; backdrop-filter: blur(6px);
        }
        .breadcrumb a { color: #fff; text-decoration: none; font-weight: 600; opacity: 0.85; }
        .breadcrumb a:hover { opacity: 1; text-decoration: underline; }
        .breadcrumb span { opacity: 0.6; margin: 0 8px; }
        .header {
            background: white; padding: 32px 40px; border-radius: 16px; margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15); border-top: 4px solid #667eea;
        }
        .header h1 { color: #333; margin-bottom: 8px; font-size: 30px; }
        .header p { color: #666; font-size: 15px; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px; margin-bottom: 30px;
        }
        .card {
            background: white; border-radius: 16px; padding: 26px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 4px solid #667eea;
        }
        .card h2 {
            color: #999; font-size: 11px; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 12px; font-weight: 600;
        }
        .card .number { font-size: 44px; font-weight: 700; color: #667eea; }
        .card .texto { font-size: 20px; font-weight: 700; color: #333; }
        .section {
            background: white; border-radius: 16px; padding: 34px;
            margin-bottom: 26px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .section h2 {
            color: #333; margin-bottom: 26px; padding-bottom: 18px;
            border-bottom: 3px solid #f0f0f0; font-size: 22px; font-weight: 600;
        }
        .form-section {
            background: linear-gradient(135deg, #f5f7ff 0%, #f0f4ff 100%);
            padding: 28px; border-radius: 12px; border: 2px solid #e9ecf8;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; margin-bottom: 8px; font-weight: 600;
            color: #333; font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%; padding: 13px 15px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 15px; font-family: inherit;
            transition: all 0.25s ease; background: white;
        }
        .form-group input::placeholder { color: #bbb; }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 13px 36px; border: none; border-radius: 10px;
            font-weight: 600; cursor: pointer; font-size: 15px;
            transition: all 0.25s ease; box-shadow: 0 5px 20px rgba(102,126,234,0.3);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .item {
            display: block; text-decoration: none;
            background: linear-gradient(135deg, #f9fafb 0%, #f5f7fb 100%);
            padding: 18px 20px; margin-bottom: 13px; border-radius: 12px;
            border: 1px solid #f0f0f0; border-left: 5px solid #667eea;
            transition: all 0.25s ease;
        }
        a.item:hover {
            box-shadow: 0 6px 22px rgba(0,0,0,0.1); transform: translateX(4px);
            border-left-color: #764ba2;
        }
        .item-title { font-weight: 700; color: #333; margin-bottom: 6px; font-size: 16px; }
        .item-details { font-size: 14px; color: #666; line-height: 1.6; }
        .chevron { float: right; color: #667eea; font-weight: 700; font-size: 18px; }
        .badge {
            display: inline-block; padding: 5px 13px; border-radius: 20px;
            font-size: 12px; font-weight: 700; margin-left: 8px;
        }
        .badge-ok { background: #d4edda; color: #155724; }
        .badge-due { background: #fff3cd; color: #856404; }
        .badge-overdue { background: #f8d7da; color: #721c24; }
        .badge-info { background: #e2e8ff; color: #3c4f9e; }
        .vacio {
            text-align: center; color: #999; padding: 36px; font-style: italic;
        }
        .aviso {
            background: #fff8e6; border: 2px solid #ffe0a3; color: #8a6d3b;
            padding: 16px; border-radius: 10px; font-size: 14px;
        }
        @media (max-width: 768px) {
            .form-row, .form-row-3 { grid-template-columns: 1fr; }
            .header, .section { padding: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        {% block breadcrumb %}{% endblock %}
        {% block contenido %}{% endblock %}
    </div>
</body>
</html>
